<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>로줄 프리뷰</title>
    <style>
      :root {
        color-scheme: light;
        --green: #5b6952;
        --ink: #050505;
        --paper: rgba(255, 255, 255, 0.46);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100dvh;
        margin: 0;
        font-family: "Noto Sans KR", "Noto Sans CJK KR", "Apple SD Gothic Neo", Arial, sans-serif;
        color: var(--ink);
        background: var(--green);
      }

      main {
        width: min(100%, 960px);
        min-height: 100dvh;
        margin: 0 auto;
        padding: clamp(40px, 9vw, 104px) clamp(22px, 6vw, 72px);
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: clamp(36px, 7vw, 72px);
      }

      .brand {
        width: min(52vw, 300px);
        height: auto;
        display: block;
      }

      .intro {
        display: grid;
        gap: 16px;
      }

      h1 {
        margin: 0;
        font-size: clamp(24px, 4.4vw, 54px);
        line-height: 1.18;
        font-weight: 500;
        letter-spacing: 0;
      }

      p {
        max-width: 560px;
        margin: 0;
        font-size: clamp(14px, 1.5vw, 18px);
        line-height: 1.75;
        opacity: 0.64;
      }

      .links {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
      }

      a {
        min-height: 172px;
        padding: 22px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        gap: 32px;
        color: inherit;
        text-decoration: none;
        background: var(--paper);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 8px;
        transition: transform 180ms ease, background-color 180ms ease;
      }

      a:hover,
      a:focus-visible {
        transform: translateY(-4px);
        background: rgba(255, 255, 255, 0.62);
        outline: none;
      }

      .label {
        font-size: clamp(19px, 2vw, 26px);
        line-height: 1.3;
        font-weight: 600;
      }

      .status {
        font-size: 13px;
        line-height: 1.5;
        opacity: 0.62;
      }

      .home {
        width: fit-content;
        min-height: 0;
        padding: 0;
        display: inline-flex;
        background: transparent;
        border: 0;
        border-radius: 0;
        font-size: 14px;
        opacity: 0.62;
      }

      .home:hover,
      .home:focus-visible {
        transform: none;
        background: transparent;
        opacity: 1;
      }

      @media (max-width: 799px) {
        main {
          justify-content: flex-start;
          padding-top: 32px;
        }

        .brand {
          width: 186px;
        }

        .links {
          grid-template-columns: 1fr;
        }

        a {
          min-height: 138px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <img class="brand" src="./_assets/v11/db3ea7af024331ec0eb061d77604a93d44afc47b.svg" alt="로줄 로줄 로줄">
      <section class="intro" aria-label="프리뷰 안내">
        <h1>작업자용 프리뷰</h1>
        <p>공개 메뉴에서는 두 번째 공연과 세 번째 공연이 오픈 전으로 막혀 있어도, 이 페이지에서는 각 공연 페이지를 직접 확인할 수 있습니다.</p>
      </section>
      <nav class="links" aria-label="공연 페이지 프리뷰">
        <a href="./first-performance.html">
          <span class="label">첫 번째 공연</span>
          <span class="status">공개 중인 페이지</span>
        </a>
        <a href="./second-performance.html">
          <span class="label">두 번째 공연</span>
          <span class="status">작업 확인용 직접 접속</span>
        </a>
        <a href="./third-performance.html">
          <span class="label">세 번째 공연</span>
          <span class="status">작업 확인용 직접 접속</span>
        </a>
      </nav>
      <a class="home" href="./index.html">홈으로 돌아가기</a>
    </main>
  </body>
</html>
